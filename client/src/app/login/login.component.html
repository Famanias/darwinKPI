<div class="auth-page">
  <!-- background pattern -->
  <div class="auth-bg-pattern"></div>

  <!-- top-left brand mark -->
  <div class="auth-page-brand">
    <span>Darwin<strong>KPI</strong></span>
  </div>

  <!-- centered card -->
  <div class="auth-card-wrap">
    <div class="auth-card">
      <img src="darwinKPI.png" alt="DarwinKPI" class="auth-card-logo" />
      <h1 class="auth-card-heading">Sign in</h1>
      <p class="auth-card-sub">
        New user?
        <a (click)="navigateToRegister()" class="auth-card-link">Create an account</a>
      </p>

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="auth-field">
          <label for="email" class="form-label">Email address</label>
          <input
            id="email"
            type="email"
            placeholder="you@company.com"
            required
            class="form-input"
            [(ngModel)]="email"
            name="email"
          />
        </div>

        <div class="auth-field">
          <div class="auth-field-row">
            <label for="password" class="form-label">Password</label>
            <a routerLink="/forgot-password" class="auth-forgot">Forgot password?</a>
          </div>
          <input
            id="password"
            type="password"
            required
            class="form-input"
            [(ngModel)]="password"
            name="password"
          />
        </div>

        <div *ngIf="error" class="alert alert-error">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
          {{ error }}
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn">Continue</button>
      </form>
    </div>
  </div>
</div>
