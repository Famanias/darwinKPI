<div class="page-shell">
  <!-- Page header -->
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem">
    <div>
      <h1>User Management</h1>
      <p>Manage user accounts and role permissions across your organisation</p>
    </div>
    <button class="btn btn-primary" (click)="openCreateModal()">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:15px;height:15px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Add User
    </button>
  </div>

  <div class="section-card">
    <div class="section-card-header">
      <h2>All Users</h2>
      <div class="search-wrap" style="width:240px">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z" />
        </svg>
        <input type="text" placeholder="Search users..." class="form-input" />
      </div>
    </div>

    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>
              <div style="display:flex;align-items:center;gap:.625rem">
                <div style="width:32px;height:32px;background:#eff6ff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                  <svg xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;color:#2563eb" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
                <span style="font-weight:500">{{ user.name }}</span>
              </div>
            </td>
            <td style="color:#64748b">{{ user.email }}</td>
            <td>
              <span class="badge" [ngClass]="{
                'badge-red':    user.role === 'Admin',
                'badge-green':  user.role === 'User',
                'badge-blue':   user.role === 'Analyst'
              }">{{ user.role }}</span>
            </td>
            <td>
              <span class="badge" [ngClass]="{
                'badge-green': user.status === 'Active',
                'badge-gray':  user.status === 'Inactive'
              }">{{ user.status }}</span>
            </td>
            <td>
              <div style="display:flex;gap:.25rem">
                <button class="icon-btn icon-btn-edit" (click)="openEditModal(user)" title="Edit">
                  <span class="material-icons" style="font-size:18px">edit</span>
                </button>
                <button class="icon-btn icon-btn-delete" (click)="deleteUser(user.id)" title="Delete">
                  <span class="material-icons" style="font-size:18px">delete</span>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="users.length === 0">
            <td colspan="5" style="text-align:center;color:#94a3b8;padding:2.5rem">No users found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Create User Modal -->
  <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" style="z-index:200" *ngIf="showCreateModal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>Add New User</h2>
        <button class="icon-btn" (click)="closeCreateModal()" style="width:28px;height:28px;font-size:1.25rem;color:#64748b">&times;</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div>
            <label class="form-label">First Name</label>
            <input type="text" placeholder="e.g., Juan" class="form-input" [(ngModel)]="newUser.firstName" />
          </div>
          <div>
            <label class="form-label">Extension</label>
            <input type="text" placeholder="e.g., Jr." class="form-input" [(ngModel)]="newUser.extension" />
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <label class="form-label">Last Name</label>
          <input type="text" placeholder="e.g., Dela Cruz" class="form-input" [(ngModel)]="newUser.lastName" />
        </div>
        <div style="margin-bottom:1rem">
          <label class="form-label">Email</label>
          <input type="email" placeholder="e.g., juan@example.com" class="form-input" [(ngModel)]="newUser.email" />
        </div>
        <div style="margin-bottom:1rem">
          <label class="form-label">Password</label>
          <input type="password" placeholder="Temporary password" class="form-input" [(ngModel)]="newUser.password" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div>
            <label class="form-label">Role</label>
            <select class="form-select" [(ngModel)]="newUser.role">
              <option value="User">User</option>
              <option value="Analyst">Analyst</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <div>
            <label class="form-label">Status</label>
            <select class="form-select" [(ngModel)]="newUser.status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeCreateModal()">Cancel</button>
        <button class="btn btn-primary" (click)="createUser()">Create User</button>
      </div>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" style="z-index:200" *ngIf="showEditModal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>Edit User</h2>
        <button class="icon-btn" (click)="closeEditModal()" style="width:28px;height:28px;font-size:1.25rem;color:#64748b">&times;</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div>
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" [(ngModel)]="editUser.firstName" />
          </div>
          <div>
            <label class="form-label">Extension</label>
            <input type="text" class="form-input" [(ngModel)]="editUser.extension" />
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" [(ngModel)]="editUser.lastName" />
        </div>
        <div style="margin-bottom:1rem">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" [(ngModel)]="editUser.email" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div>
            <label class="form-label">Role</label>
            <select class="form-select" [(ngModel)]="editUser.role">
              <option value="User">User</option>
              <option value="Analyst">Analyst</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <div>
            <label class="form-label">Status</label>
            <select class="form-select" [(ngModel)]="editUser.status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" (click)="updateUser()">Save Changes</button>
      </div>
    </div>
  </div>
</div>
