<div class="auth-page">
  <div class="auth-bg-pattern"></div>

  <div class="auth-page-brand">
    <span>Darwin<strong>KPI</strong></span>
  </div>

  <div class="auth-card-wrap">
    <div class="auth-card">
      <img src="darwinKPI.png" alt="DarwinKPI" class="auth-card-logo" />
      <h1 class="auth-card-heading">Create account</h1>
      <p class="auth-card-sub">
        Already have an account?
        <a (click)="navigateToLogin()" class="auth-card-link">Sign in</a>
      </p>

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="auth-field">
          <label for="name" class="form-label">Full Name</label>
          <input id="name" type="text" placeholder="Jane Smith" required class="form-input" [(ngModel)]="name" name="name" />
        </div>

        <div class="auth-field">
          <label for="email" class="form-label">Email address</label>
          <input id="email" type="email" placeholder="you@company.com" required class="form-input" [(ngModel)]="email" name="email" />
        </div>

        <div class="auth-field">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" required class="form-input" [(ngModel)]="password" name="password" />
          <p class="auth-hint">Must be at least 8 characters</p>
        </div>

        <div class="auth-field">
          <label for="confirm-password" class="form-label">Confirm password</label>
          <input id="confirm-password" type="password" required class="form-input" [(ngModel)]="confirmPassword" name="confirmPassword" />
        </div>

        <div class="org-section">
          <p class="org-section-label">Organisation</p>
          <div class="org-toggle">
            <button type="button" (click)="orgMode = 'create'" [class.active]="orgMode === 'create'">Create new</button>
            <button type="button" (click)="orgMode = 'join'" [class.active]="orgMode === 'join'">Join existing</button>
          </div>

          <div *ngIf="orgMode === 'create'" class="auth-field" style="margin-top:.75rem">
            <label for="org-name" class="form-label">Organisation name</label>
            <input id="org-name" type="text" placeholder="Acme Corporation" class="form-input" [(ngModel)]="organizationName" name="organizationName" />
            <p class="auth-hint">You'll automatically become the Admin</p>
          </div>

          <div *ngIf="orgMode === 'join'" class="auth-field" style="margin-top:.75rem">
            <label for="invite-code" class="form-label">Invite code</label>
            <input id="invite-code" type="text" placeholder="e.g. NOVA2025" class="form-input" style="text-transform:uppercase" [(ngModel)]="inviteCode" name="inviteCode" (blur)="verifyInviteCode()" />
            <p *ngIf="isVerifying" class="auth-hint">Verifying...</p>
            <p *ngIf="verifiedOrgName && !isVerifying" class="auth-hint" style="color:#15803d">âœ“ Joining: {{ verifiedOrgName }}</p>
            <p *ngIf="inviteCode && !verifiedOrgName && !isVerifying" class="auth-hint" style="color:#dc2626">Invalid invite code</p>
          </div>
        </div>

        <div *ngIf="error" class="alert alert-error">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
          {{ error }}
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn">Create account</button>
      </form>
    </div>
  </div>
</div>
