<div class="page-shell">
  <!-- Page header -->
  <div class="page-header">
    <h1>Analytics</h1>
    <p>Explore performance trends across all KPIs in your organisation</p>
  </div>

  <!-- Date range filter card -->
  <div class="section-card" style="margin-bottom:1.5rem">
    <div class="section-card-header">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" style="width:15px;height:15px;display:inline;margin-right:.375rem;vertical-align:-.1em" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Date Range Filter
      </h2>
    </div>
    <div class="section-card-body">
      <!-- Preset buttons -->
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem">
        <button (click)="setPresetFilter('all')" class="btn btn-secondary btn-sm">All Time</button>
        <button (click)="setPresetFilter('today')" class="btn btn-secondary btn-sm">Today</button>
        <button (click)="setPresetFilter('week')" class="btn btn-secondary btn-sm">Last 7 Days</button>
        <button (click)="setPresetFilter('month')" class="btn btn-secondary btn-sm">Last Month</button>
        <button (click)="setPresetFilter('quarter')" class="btn btn-secondary btn-sm">Last Quarter</button>
        <button (click)="setPresetFilter('year')" class="btn btn-secondary btn-sm">Last Year</button>
      </div>
      <!-- Custom date range -->
      <div style="display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end">
        <div style="min-width:180px;flex:1">
          <label for="startDate" class="form-label">Start Date</label>
          <input type="date" id="startDate" [(ngModel)]="startDate" class="form-input" />
        </div>
        <div style="min-width:180px;flex:1">
          <label for="endDate" class="form-label">End Date</label>
          <input type="date" id="endDate" [(ngModel)]="endDate" class="form-input" />
        </div>
        <div>
          <button (click)="applyDateFilter()" class="btn btn-primary">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- KPI chart cards grid -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.25rem">
    <div *ngFor="let kpi of kpis" class="section-card">
      <div class="section-card-header">
        <div>
          <h2 style="margin-bottom:.2rem">{{ kpi.name }}</h2>
          <p style="font-size:.8125rem;color:#64748b;margin:0">{{ kpi.description }}</p>
        </div>
      </div>
      <div style="padding:.875rem 1.25rem .5rem;display:flex;gap:.75rem;flex-wrap:wrap">
        <span class="badge badge-blue">{{ kpi.unit }}</span>
        <span class="badge badge-gray">Target: {{ kpi.target && kpi.target !== 0 ? kpi.target : 'Not set' }}</span>
        <span class="badge badge-purple">{{ kpi.frequency }}</span>
      </div>
      <div style="padding:0 1.25rem 1.25rem;height:220px">
        <canvas baseChart [data]="kpi.chartData" [type]="kpi.chartType!" [options]="kpi.chartOptions"></canvas>
      </div>
    </div>
  </div>
</div>
