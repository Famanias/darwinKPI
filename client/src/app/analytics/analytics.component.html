<div class="p-6">
  <h1 class="text-2xl font-bold mb-2">Analytics</h1>
  <p class="text-gray-600 mb-4">Check your performance metrics</p>

  <!-- Date Range Filter -->
  <div class="mb-6 p-4 bg-white rounded-lg shadow">
    <h3 class="text-sm font-semibold text-gray-700 mb-3">
      Filter by Date Range
    </h3>

    <!-- Preset Filters -->
    <div class="flex flex-wrap gap-2 mb-4">
      <button
        (click)="setPresetFilter('all')"
        class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
      >
        All Time
      </button>
      <button
        (click)="setPresetFilter('today')"
        class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
      >
        Today
      </button>
      <button
        (click)="setPresetFilter('week')"
        class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
      >
        Last 7 Days
      </button>
      <button
        (click)="setPresetFilter('month')"
        class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
      >
        Last Month
      </button>
      <button
        (click)="setPresetFilter('quarter')"
        class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
      >
        Last Quarter
      </button>
      <button
        (click)="setPresetFilter('year')"
        class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition"
      >
        Last Year
      </button>
    </div>

    <!-- Custom Date Range -->
    <div class="flex flex-wrap gap-4 items-end">
      <div class="flex-1 min-w-[200px]">
        <label
          for="startDate"
          class="block text-sm font-medium text-gray-700 mb-1"
          >Start Date</label
        >
        <input
          type="date"
          id="startDate"
          [(ngModel)]="startDate"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div class="flex-1 min-w-[200px]">
        <label
          for="endDate"
          class="block text-sm font-medium text-gray-700 mb-1"
          >End Date</label
        >
        <input
          type="date"
          id="endDate"
          [(ngModel)]="endDate"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div class="flex gap-2">
        <button
          (click)="applyDateFilter()"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition"
        >
          Apply Custom
        </button>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let kpi of kpis" class="p-4 bg-white rounded-2xl shadow">
      <h2 class="text-xl font-semibold text-blue-700">{{ kpi.name }}</h2>
      <p class="text-gray-600 text-sm mb-2">{{ kpi.description }}</p>

      <div class="text-sm text-gray-500 mb-1">
        <strong>Unit:</strong> {{ kpi.unit }} | <strong>Target:</strong>
        {{ kpi.target && kpi.target !== 0 ? kpi.target : "Not set" }} |
        <strong>Frequency:</strong>
        {{ kpi.frequency }}
      </div>

      <div class="mt-4 h-64">
        <canvas
          baseChart
          [data]="kpi.chartData"
          [type]="kpi.chartType!"
          [options]="kpi.chartOptions"
        >
        </canvas>
      </div>
    </div>
  </div>
</div>
